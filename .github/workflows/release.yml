name: Release Patches

on:
  push:
    branches: [release]
    paths-ignore:
      - bundle.json
      - '**/*.md'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Read version from gradle.properties
        id: version
        run: |
          VERSION=$(grep '^version' patches/gradle.properties | cut -d= -f2 | xargs)
          if [ -z "$VERSION" ]; then
            echo "::error::Could not read version from patches/gradle.properties"
            exit 1
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=v${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Building patches version ${VERSION}"

      - name: Fail if tag already exists
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if gh release view "${{ steps.version.outputs.tag }}" --repo "${{ github.repository }}" >/dev/null 2>&1; then
            echo "::error::Release ${{ steps.version.outputs.tag }} already exists. Bump 'version' in patches/gradle.properties."
            exit 1
          fi

      - name: Build patches (Android/DEX)
        working-directory: patches
        env:
          GITHUB_ACTOR: ${{ github.actor }}
          GITHUB_TOKEN: ${{ secrets.REVANCED_PACKAGES_TOKEN }}
          ORG_GRADLE_PROJECT_githubPackagesUsername: ${{ github.actor }}
          ORG_GRADLE_PROJECT_githubPackagesPassword: ${{ secrets.REVANCED_PACKAGES_TOKEN }}
        run: ./gradlew buildAndroid --no-daemon

      - name: Locate .rvp artifact
        id: rvp
        run: |
          RVP=$(ls patches/patches/build/libs/*.rvp 2>/dev/null | grep -v -- '-sources\.rvp$' | head -1)
          if [ -z "$RVP" ]; then
            echo "::error::No Android .rvp file produced. Files found in build/libs:"
            ls -la patches/patches/build/libs/ || true
            exit 1
          fi
          echo "path=${RVP}" >> "$GITHUB_OUTPUT"
          echo "name=$(basename "${RVP}")" >> "$GITHUB_OUTPUT"
          echo "Will upload: ${RVP} ($(stat -c%s "$RVP") bytes)"

      - name: Sign .rvp with GPG
        id: sign
        env:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
        run: |
          if [ -z "$GPG_PRIVATE_KEY" ]; then
            echo "::error::GPG_PRIVATE_KEY secret is not set. Signing is required — add the secret in repo settings."
            exit 1
          fi
          if [ -z "$GPG_PASSPHRASE" ]; then
            echo "::error::GPG_PASSPHRASE secret is not set. Signing is required — add the secret in repo settings."
            exit 1
          fi

          echo "$GPG_PRIVATE_KEY" | gpg --batch --import
          SIG="${{ steps.rvp.outputs.path }}.asc"

          echo "$GPG_PASSPHRASE" | gpg --batch --yes --passphrase-fd 0 \
            --pinentry-mode loopback \
            --armor --detach-sign "${{ steps.rvp.outputs.path }}"

          if [ ! -f "$SIG" ]; then
            echo "::error::Signing failed — $SIG not produced"
            exit 1
          fi
          echo "sig_path=${SIG}" >> "$GITHUB_OUTPUT"
          echo "sig_name=$(basename "$SIG")" >> "$GITHUB_OUTPUT"
          echo "Signature: ${SIG} ($(stat -c%s "$SIG") bytes)"

      - name: Create GitHub Release
        id: release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ steps.version.outputs.tag }}" \
            "${{ steps.rvp.outputs.path }}" \
            "${{ steps.sign.outputs.sig_path }}" \
            --repo "${{ github.repository }}" \
            --title "Patches ${{ steps.version.outputs.version }}" \
            --generate-notes
          BASE_URL="https://github.com/${{ github.repository }}/releases/download/${{ steps.version.outputs.tag }}"
          echo "download_url=${BASE_URL}/${{ steps.rvp.outputs.name }}" >> "$GITHUB_OUTPUT"
          echo "signature_url=${BASE_URL}/${{ steps.sign.outputs.sig_name }}" >> "$GITHUB_OUTPUT"

      - name: Update bundle.json
        run: |
          cat > bundle.json <<EOF
          {
            "created_at": "$(date -u +%Y-%m-%dT%H:%M:%S)",
            "version": "${{ steps.version.outputs.tag }}",
            "download_url": "${{ steps.release.outputs.download_url }}",
            "signature_download_url": "${{ steps.release.outputs.signature_url }}",
            "description": "Automated release of patches ${{ steps.version.outputs.version }}"
          }
          EOF

      - name: Commit bundle.json back to release branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add bundle.json
          if git diff --staged --quiet; then
            echo "bundle.json unchanged"
          else
            git commit -m "chore: update bundle.json for ${{ steps.version.outputs.tag }}"
            git push origin HEAD:release
          fi
